name: jz-a100
gpu_type: A100
remote_host: JZ
default: true
slurm:
  account: uhn@a100
  job_name_prefix: A100
  gres: gpu
  partition: null
  constraint: a100
  qos: qos_gpu_a100-t3
  dev_qos: qos_gpu_a100-dev
  max_time_hours: 20
  default_time: '19:59:59'
  dev_time: 01:59:59
  min_time: '19:00:00'
  use_min_time_default: true
  hint: nomultithread
  signal: SIGUSR1@600
  output: /lustre/fsn1/projects/rech/msf/uih12tb/logs/outputs/run%j.txt
  error: /lustre/fsn1/projects/rech/msf/uih12tb/logs/outputs/run%j.txt
  require_tag: false
resources:
  gpu_per_node: 8
  cpu_per_gpu: 8
  task_mode: per_gpu
  exclusive: false
  multi_gpu_overrides:
    trainer: ddp
modules:
  purge: true
  load:
  - arch/a100
  - git
environment:
  shell_init: /linkhome/rech/genuvt01/uih12tb/.bashrc
  activate_command: micromamba activate archeao
  exports:
    SRUN_CPUS_PER_TASK: $SLURM_CPUS_PER_TASK
    PYTHONPATH: ./src/utils/
    TORCHDYNAMO_DISABLE: '1'
    TMPDIR: /lustre/fsn1/projects/rech/msf/uih12tb/tmp
    WANDB__SERVICE_WAIT: '300'
    WANDB_MODE: offline
  wandb:
    mode: offline
    set_name: true
    set_group: true
paths:
  remote_launcher_dir: work/Utils
  default_project_dir: /lustre/fswork/projects/rech/ufh/ult23zz/AnySat
  data_dir: /lustre/fsn1/projects/rech/ufh/ult23zz/datasets/
  log_dir: /lustre/fsn1/projects/rech/msf/uih12tb/logs_AnySat/
default_overrides:
  num_workers: '6'
  hydra/job_logging: default
  hydra/hydra_logging: default
  offline: 'True'
features:
  job_chaining: false
launcher:
  command_prefix: srun
project: AnySat
